<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Diary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Mrs+Saint+Delafield&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment: #e9dfc4;
    --leather: #2b1c14;
    --leather-light: #4a2f1f;
    --ink: #1c1a24;
    --ghost-ink: #3a2a1a;
    --ember: #14120f;
    --ember-glow: rgba(20, 18, 15, 0.28);
    --stain: rgba(120, 90, 40, 0.15);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0d0805;
    overflow: hidden;
    font-family: 'EB Garamond', serif;
  }

  #stage {
    height: 100vh; width: 100vw;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1008 0%, #0d0805 70%);
  }

  .book {
    position: relative;
    width: min(92vw, 900px);
    height: min(90vh, 660px);
    background: var(--leather);
    border-radius: 6px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.4), inset 0 0 40px rgba(0,0,0,0.5);
    display: flex;
    padding: 14px;
  }

  .spine {
    width: 22px;
    background: linear-gradient(90deg, #1a0f09, var(--leather-light) 50%, #1a0f09);
    border-radius: 4px;
    margin-right: 10px;
    flex-shrink: 0;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
  }

  .page {
    position: relative;
    flex: 1;
    background:
      radial-gradient(ellipse at 20% 10%, var(--stain) 0%, transparent 35%),
      radial-gradient(ellipse at 85% 90%, var(--stain) 0%, transparent 40%),
      var(--parchment);
    border-radius: 3px;
    box-shadow: inset 0 0 60px rgba(80, 55, 20, 0.35);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .page::before{
    content: "";
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 33px, rgba(120,95,50,0.13) 34px);
    pointer-events: none;
    z-index: 0;
  }

  .surface {
    flex: 1;
    position: relative;
    padding: 40px 42px 20px 42px;
    overflow-y: auto;
    z-index: 1;
  }

  #input {
    font-family: 'IM Fell English', serif;
    font-size: 24px;
    line-height: 34px;
    color: var(--ink);
    outline: none;
    border: none;
    background: transparent;
    resize: none;
    width: 100%;
    height: 100%;
    min-height: 100%;
    padding: 0;
    display: block;
    transition: opacity 1.1s ease, filter 1.1s ease;
  }

  #input::placeholder {
    color: rgba(60,45,25,0.35);
    font-style: italic;
  }

  #input.dissolving {
    opacity: 0;
    filter: blur(6px);
  }

  #input.hidden-input {
    display: none;
  }

  /* Fade warning shown just before auto-send seals the page */
  #input.sealing {
    opacity: 0.45;
    transition: opacity 0.9s ease;
  }

  #reply {
    display: none;
    min-height: 100%;
    white-space: pre-wrap;
    word-wrap: break-word;
    opacity: 0;
    transition: opacity 1.1s ease;
  }

  #reply.visible {
    display: block;
  }

  #reply.reply-text {
    font-family: 'Mrs Saint Delafield', cursive;
    font-size: 36px;
    line-height: 46px;
    letter-spacing: 0.3px;
    color: var(--ember);
    filter: url(#inkBleed);
    text-shadow: 0 0 3px var(--ember-glow);
    animation: emberPulse 3.2s ease-in-out infinite;
  }

  #reply .diary-line {
    display: block;
    margin: 6px 0;
    transform-origin: left center;
  }

  @keyframes emberPulse {
    0%, 100% { text-shadow: 0 0 2px var(--ember-glow); }
    50% { text-shadow: 0 0 5px rgba(20,18,15,0.4); }
  }


  .again-hint {
    position: absolute;
    bottom: 16px; left: 0; right: 0;
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-style: italic; font-size: 15px;
    color: var(--ghost-ink);
    opacity: 0;
    transition: opacity 0.6s ease 0.3s;
    pointer-events: none;
    z-index: 2;
  }
  .again-hint.show { opacity: 0.45; }

  .error-note {
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    color: #7a2f1f;
    opacity: 0.8;
  }
</style>
</head>

<svg style="position:absolute; width:0; height:0;">
  <defs>
    <filter id="inkBleed">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

<div id="stage">
  <div class="book">
    <div class="spine"></div>
    <div class="page" id="pageEl">
      <div class="surface">
        <textarea id="input" placeholder="" autocapitalize="sentences" autocorrect="on" maxlength="300"></textarea>
        <div id="reply"></div>
      </div>
      <div class="again-hint" id="againHint">tap the page for another spell</div>
    </div>
  </div>
</div>

<script>
const input = document.getElementById('input');
const reply = document.getElementById('reply');
const againHint = document.getElementById('againHint');
const pageEl = document.getElementById('pageEl');

const MAX_LEN = 300;
const AUTO_SEND_DELAY = 7000;
const SEAL_WARNING_LEAD = 1000; // fade begins this many ms before auto-send fires

let state = 'writing'; // writing | dissolving | thinking | replying | done
let autoSendTimer = null;
let sealWarningTimer = null;

input.addEventListener('input', () => {
  if (state !== 'writing') return;

  if (input.value.length > MAX_LEN) {
    input.value = input.value.slice(0, MAX_LEN);
  }

  clearTimeout(autoSendTimer);
  clearTimeout(sealWarningTimer);
  input.classList.remove('sealing');

  if (input.value.trim().length > 0) {
    sealWarningTimer = setTimeout(() => {
      input.classList.add('sealing');
    }, AUTO_SEND_DELAY - SEAL_WARNING_LEAD);
    autoSendTimer = setTimeout(seal, AUTO_SEND_DELAY);
  }
});

pageEl.addEventListener('click', (e) => {
  if (state === 'done') {
    resetForNewEntry();
  }
});

async function seal() {
  if (state !== 'writing') return;
  const text = input.value.trim();
  if (!text) return;

  clearTimeout(autoSendTimer);
  clearTimeout(sealWarningTimer);

  state = 'dissolving';
  input.blur();
  input.classList.remove('sealing');
  input.classList.add('dissolving');

  await wait(1100);

  input.classList.add('hidden-input');
  reply.classList.add('visible');
  reply.style.opacity = '0';

  state = 'thinking';

  try {
    const replyText = await generateReply(text);
    await wait(150);
    reply.classList.add('reply-text');
    reply.style.opacity = '1';
    state = 'replying';
    await typewriteDiaryReply(reply, replyText, 24);
  } catch (err) {
    reply.style.opacity = '1';
    const p = document.createElement('div');
    p.className = 'error-note';
    p.textContent = 'The ink will not flow: ' + (err && err.message ? err.message : 'unknown error');
    reply.appendChild(p);
  }

  state = 'done';
  againHint.classList.add('show');
}

function resetForNewEntry() {
  reply.style.opacity = '0';
  againHint.classList.remove('show');
  setTimeout(() => {
    reply.classList.remove('reply-text', 'visible');
    reply.textContent = '';
    input.value = '';
    input.classList.remove('dissolving', 'hidden-input', 'sealing');
    input.style.opacity = '1';
    input.focus();
    state = 'writing';
  }, 900);
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

document.fonts.ready.then(() => {
  const loaded = document.fonts.check('40px "Mrs Saint Delafield"');
  if (!loaded) {
    const warn = document.createElement('div');
    warn.style.cssText = 'position:absolute; top:4px; left:4px; z-index:99; font-family:monospace; font-size:10px; color:#900; background:rgba(255,255,255,0.85); padding:2px 6px; border-radius:3px;';
    warn.textContent = 'font not loaded: Mrs Saint Delafield';
    document.body.appendChild(warn);
  }
});

async function typewriteDiaryReply(container, text, speed) {
  const words = text.split(' ');
  const chunks = [];
  let cur = [];
  for (const w of words) {
    cur.push(w);
    if (cur.length >= (4 + Math.floor(Math.random() * 3))) {
      chunks.push(cur.join(' '));
      cur = [];
    }
  }
  if (cur.length) chunks.push(cur.join(' '));

  for (const chunk of chunks) {
    const line = document.createElement('div');
    line.className = 'diary-line';
    const rot = (Math.random() * 4 - 3).toFixed(2);
    line.style.transform = `rotate(${rot}deg)`;
    container.appendChild(line);
    for (const ch of chunk) {
      line.textContent += ch;
      await wait(speed);
    }
    line.textContent += ' ';
    await wait(speed * 3);
  }
}

const QUESTION_LINES = [

  "That's a mystery even I haven't solved.",

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Word-boundary matching so keywords don't false-positive inside other
// words (e.g. "cat" inside "vacation", "wand" inside "wandering").
function findMatches(lower) {
  return Object.keys(KEYWORD_LINES).filter(k => {
    const escaped = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('\\b' + escaped + '\\b', 'i');
    return re.test(lower);
  });
}

function keywordReply(text) {
  const lower = text.toLowerCase();
  const isQuestion = /\?\s*$/.test(text.trim());
  // Prefer the most specific (longest) keyword match, so phrases like
  // "trick or treat" win over the shorter "trick" match.
  const matches = findMatches(lower).sort((a, b) => b.length - a.length);
  if (matches.length) return pick(KEYWORD_LINES[matches[0]]);
  if (isQuestion) return pick(QUESTION_LINES);
  return pick(FALLBACK_LINES);
}

/* ---------------------------------------------------------------------
 * SEMANTIC MATCHING
 * ---------------------------------------------------------------------
 * Runs entirely in the browser (no server, no API key, no per-request
 * network call) using a small sentence-embedding model. Each category
 * below reuses the exact same reply lines from KEYWORD_LINES, but is
 * matched against a handful of example sentences that describe the
 * *idea*, not just the trigger word — so "I'm dressed as a dragon
 * tonight" can match the dragon lines even though the word "dragon"
 * alone would have matched via keyword too.
 *
 * If the model fails to load, is still loading when the page is sealed,
 * or the best match is too weak, generateReply() falls straight back to
 * keywordReply() above. Nothing here can block or break a reply.
 * ------------------------------------------------------------------- */

  zombie: [
    "He's walking really slowly and groaning",
    "That makeup makes her look undead",
    "Zombies are shuffling down the street"
  ],
  spooky: [
    "This whole street feels creepy tonight",
    "That fog machine is really eerie",
    "Everything feels a little haunted right now"
  ],
  boo: [
    "Boo",
    "I'm trying to scare you",
    "Did I scare you just now"
  ],
  "my name": [
    "What's your name",
    "Who are you",
    "Tell me your name"
  ],
  "chamber of secrets": [
    "What's the secret room in the castle",
    "Tell me about the hidden chamber",
    "Is there a monster locked somewhere in the school"
  ],
  "trick or treat": [
    "Trick or treat",
    "Give me candy or I'll trick you",
    "Time to say the magic words at the door"
  ]
};

let embedder = null;
let modelReady = false;
let modelLoadingPromise = null;
let exampleVectors = []; // [{ key, vector }]

function initSemanticModel() {
  if (modelLoadingPromise) return modelLoadingPromise;
  modelLoadingPromise = (async () => {
    try {
      const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
      embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', { quantized: true });

      const tasks = [];
      for (const [key, examples] of Object.entries(SEMANTIC_EXAMPLES)) {
        for (const example of examples) {
          tasks.push(
            embedText(example).then(vector => ({ key, vector }))
          );
        }
      }
      exampleVectors = await Promise.all(tasks);
      modelReady = true;
    } catch (err) {
      // Model failed to load (offline, blocked CDN, old device, etc).
      // This is fine — generateReply() will silently use keywordReply().
      console.warn('Semantic model unavailable, using keyword fallback only.', err);
      modelReady = false;
    }
  })();
  return modelLoadingPromise;
}

// Kick off the load immediately so it's ready (or has failed gracefully)
// well before the first entry is sealed.
initSemanticModel();

async function embedText(text) {
  const output = await embedder(text, { pooling: 'mean', normalize: true });
  return Array.from(output.data);
}

function dot(a, b) {
  let sum = 0;
  for (let i = 0; i < a.length; i++) sum += a[i] * b[i];
  return sum;
}

function waitForModel(timeoutMs) {
  return new Promise((resolve) => {
    if (modelReady) return resolve(true);
    let settled = false;
    const timer = setTimeout(() => {
      if (!settled) { settled = true; resolve(false); }
    }, timeoutMs);
    modelLoadingPromise.then(() => {
      if (!settled) { settled = true; clearTimeout(timer); resolve(modelReady); }
    }).catch(() => {
      if (!settled) { settled = true; clearTimeout(timer); resolve(false); }
    });
  });
}

async function semanticReply(text) {
  const vector = await embedText(text);
  let best = null;
  for (const ex of exampleVectors) {
    const score = dot(vector, ex.vector);
    if (!best || score > best.score) best = { score, key: ex.key };
  }
  if (best && best.score >= SIM_THRESHOLD) {
    return pick(KEYWORD_LINES[best.key]);
  }
  return null;
}

async function generateReply(text) {
  const start = Date.now();
  const minDelay = 900 + Math.random() * 900; // keeps the pause feeling deliberate, not instant

  let reply = null;

  try {
    const ready = await waitForModel(MODEL_WAIT_MS);
    if (ready) {
      reply = await semanticReply(text);
    }
  } catch (err) {
    // Any embedding failure falls straight through to keywords below.
    console.warn('Semantic match failed, using keyword fallback.', err);
  }

  if (!reply) {
    reply = keywordReply(text);
  }

  const elapsed = Date.now() - start;
  if (elapsed < minDelay) await wait(minDelay - elapsed);

  return reply;
}
</script>
